app:
  name: "ScoutBot"
  env: "dev"

run:
  mode: "routes"

logging:
  level: "INFO"
  clear_logs: true
  utc: true

storage:
  root: "storage"
  db_path: "storage/db/scoutbot.sqlite3"

workspace:
  default_name: "NODERS"

telegram:
  token_env: "TELEGRAM_BOT_TOKEN"
  admin_ids_env: "TELEGRAM_ADMIN_IDS"
  allowed_user_ids_env: "TELEGRAM_ALLOWED_USER_IDS"
  chat_id_env: "TELEGRAM_ALERT_CHAT_ID"

webhook:
  host: "127.0.0.1"
  port: 8000
  path: "/webhooks/changedetection"
  body_bytes_max: 131072

changedetection:
  base_url: "http://127.0.0.1:5000"
  api_key_env: "CHANGEDETECTION_API_KEY"
  timeout: 20
  interval:
    hours: 6
  fetch_backend: "html_requests"
  webhook_secret_env: "SCOUTBOT_WEBHOOK_SECRET"
  webhook_url_env: "SCOUTBOT_WEBHOOK_URL"

discovery:
  enabled: true
  auto_queue: true
  conf_min: 0.7
  target_links_max: 30
  max_depth: 1
  request_timeout: 10
  max_response_bytes: 1000000
  allowed_kinds:
    - website
    - blog
    - docs
    - changelog
    - pricing
    - careers
    - rss
    - github
    - telegram
    - social_profile
    - link_aggregator
  require_confirmation_kinds:
    - social_profile
  blocked_domains: []
  allow_private_networks: false

signals:
  profile: "noders"
  dedupe_enabled: true
  body_excerpt_chars: 1000
  categories:
    pricing:
      - pricing
      - price
      - plan
      - enterprise
      - discount
    product:
      - feature
      - integration
      - api
      - dashboard
      - network
      - chain
    delegation:
      - delegation
      - validator
      - staking
      - commission
      - mainnet
      - testnet
      - governance
      - restaking
    validator_network:
      - validator
      - network
      - node
      - infrastructure
      - protocol
    positioning:
      - positioning
      - roadmap
      - vision
      - strategy
      - partnership
    hiring:
      - careers
      - jobs
      - engineer
      - devops
      - sales
      - bd
    legal:
      - privacy
      - terms
      - compliance
      - regulation
      - legal
    social:
      - announcement
      - community
      - event
      - meetup
      - webinar
    noise:
      - "©"
      - "All rights reserved"
      - "Accept cookies"
      - "Subscribe"
  priority:
    high_categories:
      - pricing
      - delegation
      - validator_network
    medium_categories:
      - product
      - positioning
      - hiring
      - legal
      - social
  noise:
    ignore_text:
      - "©"
      - "All rights reserved"
      - "Accept cookies"
      - "Subscribe"
    ignore_selectors:
      - "nav"
      - "footer"
      - ".cookie"
      - ".cookies"
      - ".banner"
      - ".newsletter"
      - ".subscribe"
      - ".chat"
      - "script"
      - "style"

ai:
  enabled: false

integrations:
  n8n:
    enabled: false
